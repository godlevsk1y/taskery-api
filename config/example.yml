env: "local" # local, dev, production

http_server:
  address: "localhost:0000"
  timeout: 0s
  idle_timeout: 0s

postgres_connection:
  host: "localhost"
  port: "0000"
  username: "name"
  password: ${POSTGRES_PASSWORD}
  db_name: "db_name"
  ssl_mode: "disable"

jwt:
  secret: "some-secret-key"
  ttl: 0s
  issuer: "issuer"