env: "local" # local, dev, production

http_server:
  address: "localhost:0000"
  timeout: 0s
  idle_timeout: 0s

postgres_connection:
  host: ${POSTGRES_HOST}
  port: ${POSTGRES_PORT}
  username: "name"
  password: ${POSTGRES_PASSWORD}
  db_name: "db_name"
  ssl_mode: "disable"

jwt:
  secret: ${JWT_SECRET}
  ttl: 0s
  issuer: "issuer"